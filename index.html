<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سباق الصواريخ - Responsive</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #0fff50;
            --neon-purple: #bc13fe;
            --bg-dark: #050510;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --panel-size: 130px; /* Width in Landscape, Height in Portrait */
            --planet-size: 70px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Stars Background --- */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) infinite ease-in-out;
            opacity: var(--op);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- Utility --- */
        .hidden { display: none !important; }
        .btn {
            background: linear-gradient(45deg, #2196F3, #21CBF3);
            border: none;
            padding: 8px 16px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .btn:active { transform: scale(0.95); }
        .btn-green { background: linear-gradient(45deg, #4CAF50, #8BC34A); }
        .btn-purple { background: linear-gradient(45deg, #9C27B0, #E040FB); }

        /* --- Setup Wizard --- */
        #setup-screen {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            direction: rtl;
        }

        .setup-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 1.5rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-top: 1rem;
        }

        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 1rem; color: var(--neon-blue); }
        h2 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--neon-green); }
        
        .form-section { margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        
        .input-group { margin-bottom: 0.8rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; font-weight: bold; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: white;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .avatar-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 5px;
        }
        .avatar-label { cursor: pointer; transition: 0.2s; position: relative; }
        .avatar-label:hover { transform: scale(1.1); }
        .avatar-label input { display: none; }
        .avatar-label img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            object-fit: cover;
        }
        .avatar-label input:checked + img { border-color: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }

        .question-item {
            background: rgba(255,255,255,0.05);
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 0.8rem;
            border-right: 3px solid var(--neon-blue);
        }
        .question-item h3 { font-size: 1rem; margin-bottom: 0.5rem; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
        
        select {
            width: 100%;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: 1px solid var(--border);
            border-radius: 5px;
        }

        .data-actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.5rem; }

        /* --- Game UI (Responsive) --- */
        #game-screen {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Tracks Container */
        #tracks-container {
            flex: 1;
            display: flex;
            position: relative;
            /* Default Landscape: Column of rows */
            flex-direction: column; 
            justify-content: space-evenly;
            padding: 10px;
        }

        .track-row {
            position: relative;
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.02);
            margin: 5px;
            overflow: visible;
            /* Default Landscape: Row (Left to Right) */
            flex-direction: row; 
            height: 45%; /* Take up vertical space in landscape */
            width: 100%;
        }

        /* Start Point (Team Panel) */
        .start-point {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            /* Default Landscape */
            width: var(--panel-size);
            height: 100%;
            border-right: 2px solid var(--border);
            border-top: none;
        }

        .team-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .team-name-display {
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 5px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .score-display {
            font-size: 0.8rem;
            color: var(--neon-green);
            font-weight: bold;
            margin-top: 2px;
        }

        /* Track Path */
        .track-path {
            flex: 1;
            position: relative;
            z-index: 5;
            /* Default Landscape */
            height: 100%;
            width: auto;
            margin: 0 10px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.1) 50%, transparent 50%);
            background-size: 20px 2px;
            background-repeat: repeat-x;
            background-position: center;
        }

        /* End Point (Final Planet) */
        .end-point {
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            position: relative;
            flex-shrink: 0;
            /* Default Landscape */
            width: 100px;
            height: 100%;
        }

        .final-planet-img {
            width: var(--planet-size);
            height: var(--planet-size);
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));
            animation: float 4s ease-in-out infinite;
            z-index: 20;
        }

        /* Waypoints */
        .waypoint {
            position: absolute;
            width: 30px;
            height: 30px;
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Default Landscape: Positioned by 'left' via --pos */
            left: var(--pos);
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .waypoint img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            aspect-ratio: 1/1;
            object-fit: cover;
            box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.8);
            opacity: 0.9;
            transition: 0.3s;
        }
        .waypoint.reached img { 
            opacity: 1; 
            box-shadow: 0 0 25px 8px var(--neon-green), inset 0 0 10px white;
            transform: scale(1.2); 
        }

        /* Rocket */
        .rocket-wrapper {
            position: absolute;
            width: 50px;
            height: 35px;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            /* Default Landscape: Positioned by 'left' via --progress */
            left: var(--progress, 0%);
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), bottom 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .rocket-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(0,243,255,0.8));
        }

        /* --- Portrait Mode Overrides --- */
        @media (orientation: portrait) {
            #tracks-container {
                flex-direction: row; /* Tracks side-by-side */
            }
            .track-row {
                flex-direction: column-reverse; /* Start at Bottom, End at Top */
                height: 100%;
                width: 48%; /* Split width */
            }

            /* Start Point at Bottom */
            .start-point {
                width: 100%;
                height: var(--panel-size);
                border-right: none;
                border-top: 2px solid var(--border);
            }

            /* Track Path Vertical */
            .track-path {
                width: 100%;
                height: auto;
                margin: 10px 0;
                background-image: linear-gradient(to top, rgba(255,255,255,0.1) 50%, transparent 50%);
                background-size: 2px 20px;
                background-repeat: repeat-y;
            }

            /* End Point at Top */
            .end-point {
                width: 100%;
                height: 100px;
            }

            /* Waypoints Vertical */
            .waypoint {
                left: 50%;
                top: auto;
                bottom: var(--pos); /* Use bottom instead of left */
                transform: translate(-50%, 50%);
            }

            /* Rocket Vertical */
            .rocket-wrapper {
                left: 50%;
                top: auto;
                bottom: var(--progress, 0%); /* Use bottom instead of left */
                transform: translateX(-50%) rotate(0deg); /* Face Up */
            }
        }

        /* Animations */
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Controls Bar */
        #controls-bar {
            height: 80px;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            z-index: 200;
            direction: rtl;
        }

        .control-btn {
            background: rgba(0, 243, 255, 0.15);
            border: 1px solid var(--neon-blue);
            color: white;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            min-width: 120px;
            justify-content: center;
        }
        .control-btn:active { transform: scale(0.95); background: var(--neon-blue); color: black; }
        .control-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        /* --- Modals --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modal-content {
            background: #1a1a2e;
            border: 2px solid var(--neon-blue);
            padding: 1.5rem;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,243,255,0.2);
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s;
            direction: rtl;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .close-modal {
            position: absolute;
            top: 10px;
            left: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .question-text { font-size: 1.3rem; margin-bottom: 1.5rem; line-height: 1.4; color: #fff; font-weight: bold; }
        
        .answer-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.1rem;
            text-align: right;
            padding-right: 20px;
        }
        .answer-btn:active { background: rgba(255,255,255,0.2); }
        .answer-btn.correct { background: var(--neon-green); color: black; border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
        .answer-btn.wrong { background: #ff4444; color: white; border-color: #ff4444; animation: shake-btn 0.5s; }

        @keyframes shake-btn {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Winner Screen */
        .winner-title { font-size: 3rem; margin-bottom: 1rem; color: #FFD700; text-shadow: 0 0 20px #FFD700; }
        .winner-avatar { width: 120px; height: 120px; border-radius: 50%; border: 5px solid #FFD700; margin-bottom: 1rem; object-fit: cover; box-shadow: 0 0 30px #FFD700; }

    </style>
</head>
<body>

    <!-- Game Root -->
    <div id="game-root" style="width: 100%; height: 100%; display: flex; flex-direction: column;">
        
        <div class="stars" id="stars"></div>

        <!-- Setup Screen -->
        <div id="setup-screen">
            <div class="setup-container">
                <h1>🚀 إعداد سباق الصواريخ</h1>

                <!-- Data Management -->
                <div class="data-actions">
                    <button class="btn btn-purple" onclick="exportData()">💾 حفظ (Export)</button>
                    <button class="btn btn-purple" onclick="document.getElementById('import-file').click()">📂 استيراد (Import)</button>
                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(this)">
                </div>

                <div class="form-section">
                    <h2>بيانات الفرق</h2>
                    <!-- Team 1 -->
                    <div class="input-group">
                        <label>اسم الفريق الأول</label>
                        <input type="text" id="team1-name" value="الفريق 1">
                        <div class="avatar-options" id="team1-avatars"></div>
                    </div>
                    <!-- Team 2 -->
                    <div class="input-group">
                        <label>اسم الفريق الثاني</label>
                        <input type="text" id="team2-name" value="الفريق 2">
                        <div class="avatar-options" id="team2-avatars"></div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>إعداد الأسئلة</h2>
                    <div class="input-group">
                        <label>عدد الأسئلة الإجمالي (زوجي)</label>
                        <input type="number" id="total-questions" value="4" min="2" step="2" onchange="renderQuestionInputs()">
                    </div>
                    <div id="questions-container"></div>
                </div>

                <button class="btn btn-green" style="width: 100%; padding: 15px; font-size: 1.2rem;" onclick="startGame()">ابدأ السباق 🏁</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            
            <div id="tracks-container">
                <!-- Track 1 -->
                <div class="track-row" id="track1">
                    <div class="start-point">
                        <img src="" id="game-avatar1" class="team-avatar">
                        <div class="team-name-display" id="game-name1">Team 1</div>
                        <div class="score-display">نقاط: <span id="score1">0</span></div>
                    </div>
                    
                    <div class="track-path" id="path1">
                        <!-- Rocket & Waypoints live here -->
                        <div id="waypoints1"></div>
                        <div class="rocket-wrapper" id="rocket1">
                            <img src="https://d.top4top.io/p_3712pttp61.png" class="rocket-img" style="filter: hue-rotate(180deg);">
                        </div>
                    </div>

                    <div class="end-point">
                        <img src="https://a.top4top.io/p_3712urypr1.png" class="final-planet-img">
                    </div>
                </div>

                <!-- Track 2 -->
                <div class="track-row" id="track2">
                    <div class="start-point">
                        <img src="" id="game-avatar2" class="team-avatar">
                        <div class="team-name-display" id="game-name2">Team 2</div>
                        <div class="score-display">نقاط: <span id="score2">0</span></div>
                    </div>
                    
                    <div class="track-path" id="path2">
                        <div id="waypoints2"></div>
                        <div class="rocket-wrapper" id="rocket2">
                            <img src="https://d.top4top.io/p_3712pttp61.png" class="rocket-img">
                        </div>
                    </div>

                    <div class="end-point">
                        <img src="https://a.top4top.io/p_3712urypr1.png" class="final-planet-img">
                    </div>
                </div>
            </div>

            <!-- Controls Bar -->
            <div id="controls-bar">
                <button class="control-btn" id="btn1" onclick="openQuestionModal(1)">
                    <span>❓</span> <span id="btn-text1">سؤال الفريق 1</span>
                </button>
                <button class="control-btn" id="btn2" onclick="openQuestionModal(2)">
                    <span>❓</span> <span id="btn-text2">سؤال الفريق 2</span>
                </button>
            </div>

        </div>

        <!-- Question Modal -->
        <div id="question-modal" class="modal-overlay">
            <div class="modal-content">
                <button class="close-modal" onclick="closeModal()">×</button>
                <h2 id="modal-team-title">سؤال للفريق</h2>
                <p id="modal-question-text" class="question-text"></p>
                <div id="modal-options"></div>
            </div>
        </div>

        <!-- Winner Modal -->
        <div id="winner-modal" class="modal-overlay">
            <div class="modal-content">
                <h1 id="winner-title" class="winner-title"></h1>
                <img id="winner-img" class="winner-avatar hidden">
                <p id="winner-msg" style="font-size: 1.5rem; margin-bottom: 2rem;"></p>
                <button class="btn btn-green" onclick="location.reload()">لعب مرة أخرى 🔄</button>
            </div>
        </div>

    </div>

    <script>
        // --- Sound Manager ---
        const SoundManager = {
            ctx: null,
            init: function() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playTone: function(freq, type, duration, vol=0.1) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            playClick: function() { this.playTone(600, 'sine', 0.1, 0.05); },
            playSuccess: function() {
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(now + 1);
            },
            playError: function() {
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(now + 0.3);
            },
            playSwoosh: function() {
                this.init();
                const bufferSize = this.ctx.sampleRate * 0.5;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, this.ctx.currentTime);
                filter.frequency.linearRampToValueAtTime(2000, this.ctx.currentTime + 0.2);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
            },
            playCheer: function() {
                this.init();
                [400, 500, 600, 800, 1000].forEach((f, i) => {
                    setTimeout(() => { this.playTone(f, 'square', 0.3, 0.1); }, i * 100);
                });
            }
        };

        // --- Constants ---
        const AVATARS = [
            "https://j.top4top.io/p_37149d1891.jpg", "https://e.top4top.io/p_3714pncfw1.png",
            "https://k.top4top.io/p_37148j52v1.jpeg", "https://a.top4top.io/p_3714mj6701.png",
            "https://e.top4top.io/p_3714m0syj1.jpg"
        ];
        const PLANETS = [
            "https://g.top4top.io/p_3714f8rui10.jpg", "https://f.top4top.io/p_3714cryvw9.jpg",
            "https://d.top4top.io/p_3714zn8987.jpg", "https://e.top4top.io/p_3714ekxvi8.jpg",
            "https://c.top4top.io/p_3714j3zr56.jpg", "https://j.top4top.io/p_3714pav0f1.jpg",
            "https://k.top4top.io/p_371426g4i2.jpg", "https://l.top4top.io/p_3714u61yu3.jpg",
            "https://a.top4top.io/p_3714zof4n4.jpg", "https://b.top4top.io/p_3714i4yau5.jpg",
            "https://f.top4top.io/p_37142crgq1.jpg", "https://i.top4top.io/p_3714bd2ny4.jpg",
            "https://h.top4top.io/p_371487ija3.jpg", "https://g.top4top.io/p_37146ykvk2.jpg"
        ];

        // --- State ---
        let gameData = {
            team1: { name: "", avatar: "", score: 0 },
            team2: { name: "", avatar: "", score: 0 },
            totalQuestions: 4,
            questions: [], 
            currentQIndex: 0
        };
        let currentTurnTeam = 0; 

        // --- Setup Logic ---
        function initSetup() {
            renderAvatarOptions('team1', 'team1-avatars');
            renderAvatarOptions('team2', 'team2-avatars');
            renderQuestionInputs();
            generateStars();
            document.body.addEventListener('click', () => SoundManager.init(), {once: true});
        }

        function generateStars() {
            const container = document.getElementById('stars');
            for(let i=0; i<80; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.width = Math.random()*2+'px';
                s.style.height = s.style.width;
                s.style.setProperty('--dur', (Math.random()*3+2)+'s');
                s.style.setProperty('--op', Math.random());
                container.appendChild(s);
            }
        }

        function renderAvatarOptions(groupName, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            AVATARS.forEach((url, idx) => {
                const label = document.createElement('label');
                label.className = 'avatar-label';
                label.innerHTML = `
                    <input type="radio" name="${groupName}-avatar" value="${url}" ${idx===0?'checked':''}>
                    <img src="${url}">
                `;
                label.onclick = () => SoundManager.playClick();
                container.appendChild(label);
            });
        }

        function renderQuestionInputs() {
            const count = parseInt(document.getElementById('total-questions').value) || 0;
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            for(let i=0; i<count; i++) {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.innerHTML = `
                    <h3>السؤال ${i+1}</h3>
                    <input type="text" class="q-text" placeholder="نص السؤال" required>
                    <div class="options-grid">
                        <input type="text" class="q-opt" placeholder="الخيار 1" required>
                        <input type="text" class="q-opt" placeholder="الخيار 2" required>
                        <input type="text" class="q-opt" placeholder="الخيار 3" required>
                        <input type="text" class="q-opt" placeholder="الخيار 4" required>
                    </div>
                    <label>الإجابة الصحيحة:</label>
                    <select class="q-correct">
                        <option value="0">الخيار 1</option>
                        <option value="1">الخيار 2</option>
                        <option value="2">الخيار 3</option>
                        <option value="3">الخيار 4</option>
                    </select>
                `;
                container.appendChild(div);
            }
        }

        // --- Data Management ---
        function exportData() {
            SoundManager.playClick();
            if(!collectFormData(false)) return;
            const dataStr = JSON.stringify(gameData, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "space_race_questions.json";
            a.click();
        }

        function importData(input) {
            SoundManager.playClick();
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    document.getElementById('team1-name').value = data.team1.name;
                    document.getElementById('team2-name').value = data.team2.name;
                    document.getElementById('total-questions').value = data.totalQuestions;
                    
                    const t1Radios = document.getElementsByName('team1-avatar');
                    t1Radios.forEach(r => { if(r.value === data.team1.avatar) r.checked = true; });
                    const t2Radios = document.getElementsByName('team2-avatar');
                    t2Radios.forEach(r => { if(r.value === data.team2.avatar) r.checked = true; });

                    renderQuestionInputs();
                    setTimeout(() => {
                        const qItems = document.querySelectorAll('.question-item');
                        data.questions.forEach((q, idx) => {
                            if(qItems[idx]) {
                                qItems[idx].querySelector('.q-text').value = q.text;
                                const opts = qItems[idx].querySelectorAll('.q-opt');
                                q.options.forEach((o, i) => opts[i].value = o);
                                qItems[idx].querySelector('.q-correct').value = q.correct;
                            }
                        });
                        alert("تم استيراد البيانات بنجاح!");
                    }, 100);
                } catch(err) {
                    alert("خطأ في قراءة الملف");
                    console.error(err);
                }
            };
            reader.readAsText(file);
        }

        function collectFormData(validate = true) {
            const t1Name = document.getElementById('team1-name').value;
            const t2Name = document.getElementById('team2-name').value;
            const t1Avatar = document.querySelector('input[name="team1-avatar"]:checked')?.value;
            const t2Avatar = document.querySelector('input[name="team2-avatar"]:checked')?.value;
            const total = parseInt(document.getElementById('total-questions').value);

            if(total % 2 !== 0) {
                alert("عدد الأسئلة يجب أن يكون زوجياً!");
                return false;
            }

            const questions = [];
            const qItems = document.querySelectorAll('.question-item');
            let isValid = true;
            qItems.forEach(item => {
                const text = item.querySelector('.q-text').value;
                const opts = Array.from(item.querySelectorAll('.q-opt')).map(i => i.value);
                const correct = parseInt(item.querySelector('.q-correct').value);
                if(validate && (!text || opts.some(o => !o))) isValid = false;
                questions.push({ text, options: opts, correct });
            });

            if(validate && !isValid) {
                alert("الرجاء ملء جميع حقول الأسئلة");
                return false;
            }

            gameData.team1 = { name: t1Name, avatar: t1Avatar, score: 0 };
            gameData.team2 = { name: t2Name, avatar: t2Avatar, score: 0 };
            gameData.totalQuestions = total;
            gameData.questions = questions;
            gameData.currentQIndex = 0;
            return true;
        }

        function startGame() {
            SoundManager.playClick();
            if(!collectFormData(true)) return;

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            document.getElementById('game-name1').innerText = gameData.team1.name;
            document.getElementById('game-avatar1').src = gameData.team1.avatar;
            document.getElementById('game-name2').innerText = gameData.team2.name;
            document.getElementById('game-avatar2').src = gameData.team2.avatar;
            
            document.getElementById('btn-text1').innerText = `سؤال ${gameData.team1.name}`;
            document.getElementById('btn-text2').innerText = `سؤال ${gameData.team2.name}`;

            generateWaypoints(1);
            generateWaypoints(2);
        }

        // --- Gameplay Logic (Responsive) ---
        function generateWaypoints(teamId) {
            const container = document.getElementById(`waypoints${teamId}`);
            container.innerHTML = '';
            
            const totalSteps = gameData.totalQuestions / 2;
            const waypointsCount = totalSteps - 1; 
            
            for(let i=1; i<=waypointsCount; i++) {
                const wp = document.createElement('div');
                wp.className = 'waypoint';
                wp.id = `wp-${teamId}-${i}`;
                
                // Use CSS Variable for positioning
                const pct = (i / totalSteps) * 100; 
                wp.style.setProperty('--pos', `${pct}%`);
                
                const imgIdx = (i-1) % PLANETS.length;
                wp.innerHTML = `<img src="${PLANETS[imgIdx]}">`;
                container.appendChild(wp);
            }
        }

        function openQuestionModal(team) {
            SoundManager.playClick();
            if(gameData.currentQIndex >= gameData.questions.length) {
                checkEndGame();
                return;
            }
            currentTurnTeam = team;
            const q = gameData.questions[gameData.currentQIndex];
            
            document.getElementById('modal-team-title').innerText = `سؤال لـ ${team === 1 ? gameData.team1.name : gameData.team2.name}`;
            document.getElementById('modal-question-text').innerText = q.text;
            
            const optsContainer = document.getElementById('modal-options');
            optsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx, btn);
                optsContainer.appendChild(btn);
            });
            document.getElementById('question-modal').classList.add('active');
        }

        function closeModal() {
            SoundManager.playClick();
            document.getElementById('question-modal').classList.remove('active');
        }

        function handleAnswer(selectedIdx, btn) {
            const btns = document.querySelectorAll('.answer-btn');
            btns.forEach(b => b.disabled = true);

            const q = gameData.questions[gameData.currentQIndex];
            const isCorrect = selectedIdx === q.correct;

            if(isCorrect) {
                SoundManager.playSuccess();
                btn.classList.add('correct');
                updateProgress(currentTurnTeam);
                triggerConfetti();
                setTimeout(() => {
                    closeModal();
                    gameData.currentQIndex++;
                    checkEndGame();
                }, 1500);
            } else {
                SoundManager.playError();
                btn.classList.add('wrong');
                btns[q.correct].classList.add('correct');
                shakeRocket(currentTurnTeam);
                setTimeout(() => {
                    closeModal();
                    gameData.currentQIndex++;
                    checkEndGame();
                }, 2000);
            }
        }

        function updateProgress(team) {
            const teamObj = team === 1 ? gameData.team1 : gameData.team2;
            teamObj.score++;
            document.getElementById(`score${team}`).innerText = teamObj.score;

            const totalSteps = gameData.totalQuestions / 2;
            const rocket = document.getElementById(`rocket${team}`);
            
            let newPos;
            if (teamObj.score >= totalSteps) {
                // Final position: Overlap the large planet
                // In both modes, the planet is at the end of the flex container.
                // We use calc(100% + offset) to reach it.
                newPos = `calc(100% + 50px)`;
                
                setTimeout(() => bigConfetti(), 800);
            } else {
                const pct = (teamObj.score / totalSteps) * 100;
                newPos = `${pct}%`;
            }
            
            // Update CSS variable instead of direct style
            rocket.style.setProperty('--progress', newPos);
            SoundManager.playSwoosh();

            const wp = document.getElementById(`wp-${team}-${teamObj.score}`);
            if(wp) wp.classList.add('reached');

            if(teamObj.score >= totalSteps) {
                setTimeout(() => showWinner(team), 1500);
            }
        }

        function shakeRocket(team) {
            const rocket = document.getElementById(`rocket${team}`);
            rocket.classList.add('shake');
            setTimeout(() => rocket.classList.remove('shake'), 500);
        }

        function checkEndGame() {
            if(gameData.currentQIndex >= gameData.questions.length) {
                const t1 = gameData.team1.score;
                const t2 = gameData.team2.score;
                const max = gameData.totalQuestions / 2;

                if(t1 >= max && t2 >= max) {
                    showDraw();
                } else if (t1 >= max) {
                    showWinner(1);
                } else if (t2 >= max) {
                    showWinner(2);
                } else {
                    if(t1 > t2) showWinner(1);
                    else if(t2 > t1) showWinner(2);
                    else showDraw();
                }
            }
        }

        function showWinner(team) {
            SoundManager.playCheer();
            const modal = document.getElementById('winner-modal');
            const title = document.getElementById('winner-title');
            const img = document.getElementById('winner-img');
            const msg = document.getElementById('winner-msg');
            
            const teamObj = team === 1 ? gameData.team1 : gameData.team2;
            title.innerText = "🏆 الفائز! 🏆";
            msg.innerText = `مبروك لفريق ${teamObj.name}`;
            img.src = teamObj.avatar;
            img.classList.remove('hidden');
            modal.classList.add('active');
            bigConfetti();
        }

        function showDraw() {
            SoundManager.playCheer();
            const modal = document.getElementById('winner-modal');
            const title = document.getElementById('winner-title');
            const img = document.getElementById('winner-img');
            const msg = document.getElementById('winner-msg');
            title.innerText = "🤝 تعادل الأبطال! 🤝";
            msg.innerText = "أداء رائع من الفريقين!";
            img.classList.add('hidden');
            modal.classList.add('active');
            bigConfetti();
        }

        function triggerConfetti() {
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 } });
        }

        function bigConfetti() {
            const end = Date.now() + 5000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        initSetup();
    </script>
</body>
</html>
